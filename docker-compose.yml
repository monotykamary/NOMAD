services:
  app:
    image: mauriceboe/nomad:2.5.5
    container_name: nomad
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET:-}
      # - ALLOWED_ORIGINS=https://yourdomain.com  # Optional: restrict CORS to specific origins
      - PORT=3000
    volumes:
      # Option 1: Keep separate volumes (backward compatible)
      - ./data:/app/data
      - ./uploads:/app/uploads
      
      # Option 2: Consolidated - uploads inside data (commented out)
      # - ./data:/app/data
      # Set environment: UPLOADS_DIR=/app/data/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
