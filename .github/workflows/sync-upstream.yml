name: Sync Upstream & Auto-Merge

on:
  schedule:
    # Run daily at 6:00 UTC (adjust as needed)
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to sync (default: main)'
        required: false
        default: 'main'

env:
  UPSTREAM_REPO: mauriceboe/nomad
  UPSTREAM_BRANCH: main
  DOWNSTREAM_BRANCH: main

jobs:
  sync-upstream:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/${{ env.UPSTREAM_REPO }}.git || true
          git fetch upstream ${{ env.UPSTREAM_BRANCH }}

      - name: Check for changes
        id: check
        run: |
          git fetch origin ${{ env.DOWNSTREAM_BRANCH }}
          git fetch upstream ${{ env.UPSTREAM_BRANCH }}
          
          LOCAL=$(git rev-parse origin/${{ env.DOWNSTREAM_BRANCH }})
          REMOTE=$(git rev-parse upstream/${{ env.UPSTREAM_BRANCH }})
          BASE=$(git merge-base origin/${{ env.DOWNSTREAM_BRANCH }} upstream/${{ env.UPSTREAM_BRANCH }})
          
          if [ $LOCAL = $REMOTE ]; then
            echo "✅ Already up to date with upstream"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          elif [ $LOCAL = $BASE ]; then
            echo "📥 Need to fast-forward (no conflicts expected)"
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "can_fast_forward=true" >> $GITHUB_OUTPUT
          else
            echo "⚠️ Diverged - may need manual merge resolution"
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "can_fast_forward=false" >> $GITHUB_OUTPUT
          fi

      - name: Fast-forward merge (if possible)
        if: steps.check.outputs.has_changes == 'true' && steps.check.outputs.can_fast_forward == 'true'
        run: |
          git checkout ${{ env.DOWNSTREAM_BRANCH }}
          git merge --ff-only upstream/${{ env.UPSTREAM_BRANCH }}
          git push origin ${{ env.DOWNSTREAM_BRANCH }}
          echo "✅ Fast-forwarded to upstream/${{ env.UPSTREAM_BRANCH }}"

      - name: Create PR for diverged branches
        if: steps.check.outputs.has_changes == 'true' && steps.check.outputs.can_fast_forward == 'false'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: upstream-sync-${{ github.run_id }}
          title: 'Sync upstream changes from ${{ env.UPSTREAM_REPO }}'
          body: |
            ## Upstream Sync
            
            This PR syncs changes from upstream repository `${{ env.UPSTREAM_REPO }}`.
            
            ⚠️ **Manual review required** - Branches have diverged and cannot be fast-forwarded.
            
            ### Action Required
            - [ ] Review changes for conflicts
            - [ ] Resolve any merge conflicts
            - [ ] Test the merged code
            - [ ] Merge when ready
            
            _This PR was automatically created by the sync workflow._
          base: ${{ env.DOWNSTREAM_BRANCH }}
          delete-branch: true

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '⚠️ Upstream sync failed',
              body: `Failed to sync with upstream \`${{ env.UPSTREAM_REPO }}\`.\n\nSee workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['upstream-sync', 'automation']
            })
